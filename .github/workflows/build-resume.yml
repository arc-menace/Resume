name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - 'resume.md'
      - '.github/workflows/build-resume.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Microsoft fonts
        run: |
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mttcorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer
          sudo fc-cache -f -v

      - name: Build PDF
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -v /usr/share/fonts:/usr/share/fonts:ro \
            pandoc/extra:latest \
            resume.md --pdf-engine=xelatex -o JoeHahnResume.pdf

      - name: Publish to 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Resume
          files: JoeHahnResume.pdf
          make_latest: 'true'